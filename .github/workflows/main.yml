name: Windows-Enterprise-System-Check
on:
  workflow_dispatch:

jobs:
  health-check:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System Environment Optimization
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          powercfg /x -hibernate-timeout-ac 0
          powercfg /x -standby-timeout-ac 0

      - name: Provision Debug User
        shell: pwsh
        run: |
          $pass = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 18 | ForEach-Object {[char]$_})
          Write-Host "::add-mask::$pass"
          $user = "SystemDebug"
          $secPass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $secPass -FullName "Diagnostic Account"
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $user
          Write-Host "::notice title=CREDENCIAIS::Usuario: $user | Senha: $pass"

      - name: Network Layer Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://tailscale.com" -OutFile "ts.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "ts.msi", "/quiet", "/norestart" -Wait
          
          # USA O SECRET DO GITHUB - NUNCA COLE A CHAVE AQUI
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="win-node-${{ github.run_id }}"
          
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "::warning title=IP RDP::$ip"

      - name: Keep Alive Execution
        shell: pwsh
        run: |
          $total = 21600
          $start = Get-Date
          while ((Get-Date) -lt $start.AddSeconds($total)) {
              Write-Progress -Activity "Running Stress Test" -Status "Active"
              Start-Sleep -Seconds 60
          }
